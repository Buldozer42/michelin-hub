
services:
###> doctrine/doctrine-bundle ###
  database:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-michelin-hub}
      MYSQL_USER: ${MYSQL_USER:-michelin}
      # You should definitely change the password in production
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ChangeMe}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ChangeMe}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/mysql:rw
###< doctrine/doctrine-bundle ###

  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    depends_on:
      database:
        condition: service_healthy
    environment:
      APP_ENV: dev
      APP_DEBUG: "1"
      COMPOSER_CACHE_DIR: /tmp/composer-cache
      DATABASE_URL: mysql://michelin:ChangeMe@database:3306/michelin-hub?serverVersion=8.0.32&charset=utf8mb4
      CORS_ALLOW_ORIGIN: ^https?://(localhost|127\.0\.0\.1|192\.168\.\d+\.\d+)(:[0-9]+)?$
      JWT_SECRET_KEY: /var/www/html/config/jwt/private.pem
      JWT_PUBLIC_KEY: /var/www/html/config/jwt/public.pem
      JWT_PASSPHRASE: 1adbada5d35f9804c04fe6abec946630d391cb9715e6a8873859b091859ace73
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID:-258596}
      STRAVA_SECRET: ${STRAVA_SECRET:-acd95741faefe7fd618b918e83e3aad871065b3b}
      STRAVA_AUTH_REDIRECT_URL: ${STRAVA_AUTH_REDIRECT_URL:-http://localhost:3000/strava/callback}
    volumes:
      - ./:/var/www/html
      - composer_cache:/tmp/composer-cache
    command: >-
      sh -c "
      if [ ! -f vendor/autoload.php ]; then composer install --no-interaction --prefer-dist; fi &&
      php -S 0.0.0.0:8000 -t public
      "
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    working_dir: /app
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    command: >-
      sh -c "
      if [ ! -d node_modules ] || [ -z \"$$(ls -A node_modules 2>/dev/null)\" ]; then npm ci; fi &&
      npm run dev -- --hostname 0.0.0.0 --webpack
      "
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
###> doctrine/doctrine-bundle ###
  database_data:
###< doctrine/doctrine-bundle ###
  composer_cache:
  frontend_node_modules:
  frontend_next_cache:
